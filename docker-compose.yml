services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ainurse
      POSTGRES_PASSWORD: ainurse
      POSTGRES_DB: ainurse
    ports:
      - "5432:5432"
    volumes:
      - ainurse_db:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  ainurse_db:
